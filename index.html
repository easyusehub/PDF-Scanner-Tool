<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Scanner Tool</title>
<meta name="description" content="Upload images or PDFs to create multi-page PDFs online. Mobile-friendly, live preview, and download.">
<style>
body { font-family: Arial,sans-serif; margin:0; padding:0; background:#f9f9f9; color:#333; }
header { padding:15px; background:#9333ea; color:#fff; text-align:center; }
header h1 { margin:0; font-size:1.8rem; }
header p { margin:5px 0 0; font-size:0.95rem; }
.ad-placeholder { width:100%; height:60px; background:#ccc; text-align:center; line-height:60px; margin:10px 0; border-radius:8px; }
.container { max-width:900px; margin:20px auto; padding:0 15px; }
#upload-box { border:3px dashed #9333ea; padding:20px; text-align:center; cursor:pointer; border-radius:10px; background:#fff; margin-bottom:15px; }
#preview { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
#preview img { max-width:200px; border:1px solid #ccc; border-radius:5px; }
.controls { display:flex; flex-wrap:wrap; justify-content:center; margin-bottom:10px; gap:10px; }
button { padding:10px 20px; border:none; border-radius:8px; background:#9333ea; color:#fff; cursor:pointer; }
#toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#9333ea; color:#fff; padding:10px 20px; border-radius:8px; display:none; z-index:9999; }
</style>
</head>
<body>

<header>
<h1>PDF Scanner Tool</h1>
<p>Upload images to create multi-page PDFs.</p>
</header>

<div class="ad-placeholder">Top Ad Placeholder</div>

<div class="container">

<div id="upload-box">📁 Upload Images</div>
<input type="file" id="fileInput" accept="image/*" multiple hidden>

<div id="preview"></div>

<div class="ad-placeholder">Middle Ad Placeholder</div>

<div class="controls">
<button id="downloadPdfBtn">Download PDF</button>
<button onclick="window.location.href='https://easyusehub.blogspot.com/?m=1'">🏠 Home</button>
<button onclick="window.location.href='https://easyusehub.blogspot.com/p/free-pdf-tools-online.html'">📚 All PDF Tools</button>
</div>

<div id="toast">PDF downloaded!</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const { jsPDF } = window.jspdf;

const uploadBox = document.getElementById('upload-box');
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const downloadBtn = document.getElementById('downloadPdfBtn');
const toast = document.getElementById('toast');

let images = [];

uploadBox.onclick = () => fileInput.click();

fileInput.addEventListener('change', e => {
    Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            images.push(img);
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    });
});

// Download PDF
downloadBtn.addEventListener('click', () => {
    if(images.length === 0) return alert("No images to convert!");
    const pdf = new jsPDF();
    images.forEach((img, i) => {
        if(i > 0) pdf.addPage();
        const imgProps = pdf.getImageProperties(img.src);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        pdf.addImage(img.src, 'JPEG', 0, 0, pdfWidth, pdfHeight);
    });
    pdf.save('scanned.pdf');
    toast.style.display='block';
    setTimeout(()=>{toast.style.display='none';},2500);
});
</script>
</body>
</html>
